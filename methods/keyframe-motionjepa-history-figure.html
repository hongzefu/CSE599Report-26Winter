<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyframe-MotionJEPA Memory Pipeline · Architecture Figure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff; --ink:#1a1410; --ink-soft:#4a3f35;
  --rule:#d9cfbe;
  --accent:#d85400; --accent-soft:#ffe8d4;
  --motion:#2f6fd6; --motion-soft:#dce8fb;
  --frozen-bg:#e7eee5; --frozen-border:#9db89a; --frozen-ink:#3a5a40;
  --kept:#2f9d62;
  --policy-bg:#f4eef9; --policy-border:#a48bc4; --policy-ink:#5b3f80;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#ffffff; color:var(--ink);
  min-height:100vh; padding:24px 24px 24px;
}
.wrap{max-width:1280px;margin:0 auto;position:relative;z-index:1}

.legend{display:flex;gap:18px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--ink-soft);margin-bottom:18px}
.legend span{display:inline-flex;align-items:center;gap:7px}
.swatch{width:12px;height:12px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.08)}

.figure{
  background:#ffffff;border:none;border-radius:0;
  padding:0;
}

/* fixed canvas for absolute layout + arrow alignment */
.canvas{
  position:relative;
  width:1216px;
  height:720px;
  margin:0 auto;
}
@media (max-width: 1280px){
  body{padding:16px 12px 16px}
  .canvas{transform-origin:top left;transform:scale(.94)}
}

.arrows{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.block{position:absolute;z-index:2}

/* ---------- module box ---------- */
.mod{
  background:#fff;border:1.5px solid var(--rule);border-radius:9px;
  padding:9px 12px 11px;
  box-shadow:0 2px 6px -3px rgba(26,20,16,.1);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  height:100%;
}
.mod.accent{border-color:var(--accent);background:linear-gradient(180deg,#fff,#fff7ee)}
.mod.motion{border-color:var(--motion);background:linear-gradient(180deg,#fff,#f4f8ff)}
.mod.frozen{border-color:var(--frozen-border);background:var(--frozen-bg)}
.mod.policy{border-color:var(--policy-border);background:var(--policy-bg)}
.mod.dashed{border-style:dashed;background:#fff}

.mod-name{
  font-family:'Fraunces',serif;font-weight:600;font-size:15px;
  letter-spacing:-.005em;color:var(--ink);line-height:1.15;
  align-self:flex-start;margin-bottom:1px;
}
.mod.accent .mod-name{color:var(--accent)}
.mod.motion .mod-name{color:var(--motion)}
.mod.frozen .mod-name{color:var(--frozen-ink)}
.mod.policy .mod-name{color:var(--policy-ink)}

/* ---------- input strip ---------- */
.input-strip .frames-row{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;width:100%}
.input-strip .frame{aspect-ratio:1/1;border-radius:3px;overflow:hidden;border:1.5px solid transparent;background:#e8dfcc;position:relative}
.input-strip .frame svg{display:block;width:100%;height:100%}
.input-strip .frame.kf{border-color:var(--accent);box-shadow:0 0 0 1.5px rgba(216,84,0,.18)}
.input-strip .frame.mt{outline:1.5px solid rgba(47,111,214,.55);outline-offset:0}
.input-strip .frame.inter{opacity:.45}
.input-strip .axis-row{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;
  font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink-soft);
  text-align:center;margin-top:3px;line-height:1}
.input-strip .axis-row span.kf{color:var(--accent);font-weight:700}
.input-strip .axis-row span.mt{color:var(--motion);font-weight:600}
.input-title{display:flex;align-items:baseline;gap:10px;width:100%;margin-bottom:4px}
.input-title .name{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--ink)}
.input-title .meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);margin-left:auto;letter-spacing:.04em}

/* ---------- CLIP ---------- */
.delta-inset{
  width:100%;height:84px;background:#fbf6ea;border:1px solid var(--rule);
  border-radius:6px;overflow:hidden;
}
.delta-inset svg{display:block;width:100%;height:100%}
.kf-tags{display:flex;flex-wrap:wrap;gap:5px;width:100%;margin-top:auto}
.kf-tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;letter-spacing:.04em;
}
.kf-thumb-row{display:flex;gap:8px;width:100%;justify-content:center;margin-top:auto}
.kf-thumb-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.kf-thumb-img{
  width:48px;height:48px;border-radius:5px;overflow:hidden;
  border:1.5px solid var(--accent);
  box-shadow:0 0 0 1.5px rgba(216,84,0,.18);
}
.kf-thumb-img svg{display:block;width:100%;height:100%}
.kf-thumb-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  font-weight:700;color:var(--accent);text-align:center;
}

/* ---------- TokenDrop three-grid layout ---------- */
.td-grid-row{display:flex;gap:12px;width:100%;flex:1;min-height:0;align-items:flex-start}
.td-grid-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.td-grid-sq{
  width:100%;aspect-ratio:1/1;border-radius:5px;overflow:hidden;
  border:1.5px solid var(--accent);
  box-shadow:0 0 0 1.5px rgba(216,84,0,.15);
}
.td-grid-sq svg{display:block;width:100%;height:100%}
.td-grid-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  font-weight:700;color:var(--accent);text-align:center;
}

/* ---------- TokenDrop ---------- */
.td-row{display:grid;grid-template-columns:1fr 12px 1fr 12px 1fr;align-items:center;gap:0;width:100%}
.td-thumb{aspect-ratio:1/1;width:100%;border-radius:5px;overflow:hidden;border:1.5px solid var(--rule)}
.td-thumb.ref{border-color:var(--accent)}
.td-thumb svg{display:block;width:100%;height:100%}
.td-arrow-tiny{font-size:14px;color:var(--ink-soft);text-align:center;line-height:1;opacity:.55}
.td-grid{aspect-ratio:1/1;width:100%}
.td-grid svg{display:block;width:100%;height:100%}
.td-caption{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-soft);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;width:100%;text-align:center;line-height:1.35;margin-top:4px;
}

/* ---------- token output boxes ---------- */
.tok-out{
  border:1.5px dashed var(--rule);border-radius:8px;background:#fff;
  padding:8px 10px;display:flex;flex-direction:column;gap:6px;width:100%;height:100%;
  align-items:center;justify-content:center;
}
.tok-out.kf{border-color:rgba(216,84,0,.55)}
.tok-out.mt{border-color:rgba(47,111,214,.55);background:#f9fbff}
.tok-out .tlabel{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-soft);
  letter-spacing:.1em;text-transform:uppercase;
}
.tok-out.kf .tlabel{color:var(--accent)}
.tok-out.mt .tlabel{color:var(--motion)}

.kf-tok-mini{display:flex;gap:8px;align-items:flex-start;justify-content:center}
.kf-tok-mini .item{display:flex;flex-direction:column;align-items:center;gap:3px}
.kf-tok-mini .grid-mini{width:42px;height:42px}
.kf-tok-mini .grid-mini svg{display:block;width:100%;height:100%}
.kf-tok-mini .clab{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);font-weight:700}

.mt-tok-mini{display:flex;gap:5px;align-items:center;justify-content:center}
.mt-tok-mini .mtok{width:10px;height:26px;border-radius:2px;background:var(--motion)}

/* ---------- frame pair (single) ---------- */
.pair-single{display:flex;align-items:center;gap:8px;width:100%;justify-content:center}
.pair-single .pframe{width:60px;height:60px;border-radius:5px;overflow:hidden;border:1.5px solid var(--rule)}
.pair-single .pframe.anchor{border-color:var(--motion)}
.pair-single .pframe svg{display:block;width:100%;height:100%}
.pair-single .pa{font-size:18px;color:var(--motion);line-height:1;opacity:.7}
.pair-tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--motion);
  letter-spacing:.04em;font-weight:600;margin-top:auto}

/* ---------- SigLIP ---------- */
.siglip-stack{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center}
.siglip-tag{
  border:1px solid var(--frozen-border);background:#fff;border-radius:5px;
  padding:7px 10px;text-align:center;width:100%;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  color:var(--frozen-ink);letter-spacing:.05em;
}
.frozen-pill{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--frozen-ink);
  background:#fff;border:1px solid var(--frozen-border);border-radius:3px;
  padding:1px 6px;align-self:flex-start;margin-bottom:1px;
}

/* ---------- MotionEncoder ---------- */
.me-formula{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--motion);
  background:var(--motion-soft);border-radius:6px;padding:9px 12px;line-height:1.5;
  width:100%;text-align:left;
}
.me-formula .dim{color:var(--ink-soft);font-size:10px}

/* ---------- History (vertical, right-column) ---------- */
.history{
  background:linear-gradient(180deg,#fff7e6 0%,#fff 55%,#e8f0fb 100%);
  border:1.5px solid var(--rule);border-radius:11px;
  padding:12px 16px 12px;height:100%;display:flex;flex-direction:column;
}
.history-name{
  font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--ink);
  margin-bottom:8px;flex:none;
}
.history-rows{
  display:flex;flex-direction:column;gap:4px;width:100%;flex:1;min-height:0;
}
.h-cell{
  display:flex;align-items:center;gap:10px;
  background:#fff;border:1.5px solid var(--rule);border-radius:6px;
  padding:3px 9px;height:34px;
}
.h-cell.kf{border-color:var(--accent);background:#fffaf3;box-shadow:0 1px 3px -2px rgba(216,84,0,.25)}
.h-cell.mt{border-color:var(--motion);background:#f4f8ff}
.h-cell .h-tok{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  flex:none;
}
.h-cell .h-tok svg{display:block;width:100%;height:100%}
.h-cell.mt .mtb{width:11px;height:22px;border-radius:2px;background:var(--motion)}
.h-cell .h-name{
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:13px;
  letter-spacing:0;line-height:1;flex:1;
}
.h-cell.kf .h-name{color:var(--accent)}
.h-cell.mt .h-name{color:var(--motion)}
.h-cell .h-t{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-soft);
  letter-spacing:.04em;line-height:1;flex:none;
}

/* ---------- Downstream policy ---------- */
.policy{
  display:flex;align-items:center;gap:14px;height:100%;padding:10px 16px;
}
.policy .name{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--policy-ink)}
.policy .arrow-out{font-size:18px;color:var(--policy-ink);opacity:.7;line-height:1}
.action-out{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--policy-ink);
  border:1.5px solid var(--policy-border);background:#fff;border-radius:6px;
  padding:6px 11px;letter-spacing:.06em;font-weight:700;flex:none;
}

/* ---------- SAM2Act-style module boxes ---------- */
.sam-box{
  width:100%;height:100%;border-radius:16px;position:relative;
  display:flex;align-items:center;justify-content:center;
  border:2px solid;
  box-shadow:0 3px 12px -6px rgba(0,0,0,.18);
}
.siglip-box{background:#e8f4ea;border-color:var(--frozen-border)}
.motion-box{background:var(--motion-soft);border-color:var(--motion)}
.sam-box-name{
  font-family:'Fraunces',serif;font-weight:700;font-size:17px;
  text-align:center;line-height:1.35;
}
.siglip-box .sam-box-name{color:var(--frozen-ink)}
.motion-box .sam-box-name{color:var(--motion)}
.sam-badge-corner{
  position:absolute;top:9px;right:9px;
  background:var(--frozen-border);color:#fff;
  font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;line-height:1.5;
}

/* ---------- Token sequence (history redesign) ---------- */
.tok-sequence{display:flex;flex-direction:column;gap:5px;width:100%;flex:1;min-height:0}
.tok-group{display:flex;align-items:center;gap:6px}
.tg-label{width:68px;flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.tg-name{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:12px;line-height:1}
.tg-name.kf{color:var(--accent)}
.tg-name.mt{color:var(--motion)}
.tg-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-soft);line-height:1}
.tg-right{display:flex;align-items:center;gap:3px}

/* ---------- caption ---------- */
.caption{
  font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;
  color:var(--ink-soft);line-height:1.55;margin-top:18px;padding-top:14px;
  border-top:1px solid var(--rule);max-width:1200px;
}
.caption b{color:var(--ink);font-weight:600;font-style:normal;font-family:'Inter',sans-serif;font-size:12.5px;letter-spacing:.02em}

footer{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.06em;color:var(--ink-soft);text-align:right}
</style>
</head>
<body>
<div class="wrap">

<div class="figure">
  <div class="canvas" id="canvas" style="height:720px">

    <!-- Arrow overlay -->
    <svg class="arrows" id="arrows" viewBox="0 0 1216 720" preserveAspectRatio="none"></svg>

    <!-- ============ Input strip ============ -->
    <div class="block" style="left:0;top:0;width:1216px;height:180px">
      <div class="mod" style="padding:8px 12px 9px">
        <div class="input-title">
          <span class="name">Execution History(Live updated)</span>
        </div>
        <div class="input-strip" style="width:100%">
          <div>
            <div class="frames-row" id="rawFrames0"></div>
            <div class="axis-row" id="rawIdx0"></div>
          </div>
          <div style="margin-top:4px">
            <div class="frames-row" id="rawFrames1"></div>
            <div class="axis-row" id="rawIdx1"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ KF branch (top-half) ============ -->
    <!-- CLIP -->
    <div class="block" style="left:0;top:204px;width:260px;height:208px">
      <div class="mod accent">
        <span class="mod-name">Clip Dis Keyframe Selection</span>
        <div class="delta-inset"><svg id="curveSvg" viewBox="0 0 320 100" preserveAspectRatio="none"></svg></div>
        <div class="kf-thumb-row" id="kfThumbRow"></div>
      </div>
    </div>

    <!-- TokenDrop -->
    <div class="block" style="left:286px;top:204px;width:420px;height:208px">
      <div class="mod accent">
        <span class="mod-name">Keyframe TokenDrop</span>
        <div class="td-grid-row" id="tdGridRow"></div>
      </div>
    </div>

    <!-- ============ MT branch (bottom-half) ============ -->
    <!-- Frame pair (single) -->
    <div class="block" style="left:0;top:436px;width:180px;height:160px">
      <div class="mod motion">
        <span class="mod-name">Frame pair</span>
        <div class="pair-single">
          <div class="pframe anchor" id="pairAnchor"></div>
          <div class="pa">→</div>
          <div class="pframe" id="pairFuture"></div>
        </div>
        <span class="pair-tag">(t, t+8) · 1 of 5 windows</span>
      </div>
    </div>

    <!-- Frozen SigLIP -->
    <div class="block" style="left:230px;top:436px;width:150px;height:160px">
      <div class="sam-box siglip-box">
        <div class="sam-badge-corner">frozen</div>
        <div class="sam-box-name">SigLip</div>
      </div>
    </div>

    <!-- MotionEncoder -->
    <div class="block" style="left:480px;top:436px;width:200px;height:160px">
      <div class="sam-box motion-box">
        <div class="sam-box-name">MotionEncoder</div>
      </div>
    </div>

    <!-- ============ Combined History (right column, vertical) ============ -->
    <div class="block" style="left:740px;top:204px;width:476px;height:420px">
      <div class="history">
        <div class="history-name">Combined history token sequence</div>
        <div class="tok-sequence" id="tokSequence"></div>
      </div>
    </div>

    <!-- ============ Downstream policy (below history, right column) ============ -->
    <div class="block" style="left:740px;top:656px;width:476px;height:62px">
      <div class="mod policy">
        <div class="policy">
          <span class="name">Downstream Policy</span>
          <span class="arrow-out">→</span>
          <span class="action-out">Action a<sub>t</sub></span>
        </div>
      </div>
    </div>

  </div>

</div>

</div>

<script>
/* =================================================================
   Parameters
================================================================= */
const T = 48;
const keyframes     = [0, 35, 47];
const motionWindows = [{t0:0,t1:8},{t0:8,t1:16},{t0:16,t1:24},{t0:24,t1:32},{t0:32,t1:40}];
const mtEdges       = new Set(motionWindows.map(w => w.t1));

function expandPatchRuns(runs){
  return runs.flatMap(([r,c0,c1]) =>
    Array.from({length:c1-c0+1},(_,offset)=>[r, c0+offset])
  );
}
const tdPatchData = {
  35:{ sig: expandPatchRuns([[4,5,7],[5,5,8],[6,6,9],[7,7,10],[8,8,11]]),
       rect:{r0:4,c0:5,r1:8,c1:11} },
  47:{ sig: expandPatchRuns([[6,9,10],[7,9,11],[8,10,12],[9,11,13]]),
       rect:{r0:6,c0:9,r1:9,c1:13} },
};
const demoSig  = tdPatchData[35].sig;
const demoRect = tdPatchData[35].rect;

function rectPatchCount(rect){
  if(!rect) return 0;
  return (rect.r1 - rect.r0 + 1) * (rect.c1 - rect.c0 + 1);
}

/* =================================================================
   frameSVG (synthetic robot scene)
================================================================= */
let _gid = 0;
function _frameSVGInner(t, uid){
  const kfBefore = keyframes.filter(k => k <= t);
  const stage = kfBefore.length - 1;
  const lastKf = kfBefore[kfBefore.length-1] ?? 0;
  const localT = (t - lastKf) % 16;
  const desk     = ['#c69a6b','#b88856','#d0a274','#a87d50','#be8f5d'][stage%5];
  const deskDark = ['#8a6236','#7a5428','#9a6b3c','#6e4820','#835932'][stage%5];
  const gx = 32 + localT * 3.2;
  const cubeSet = [
    [[22,58,'#b53b2e'],[46,62,'#e8e2d4']],
    [[30,60,'#b53b2e'],[52,58,'#e8e2d4']],
    [[38,62,'#b53b2e'],[58,56,'#e8e2d4']],
    [[46,60,'#b53b2e'],[62,54,'#e8e2d4']],
    [[52,58,'#b53b2e'],[66,56,'#e8e2d4']],
  ][stage%5];
  return `<defs><linearGradient id="g${uid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${desk}"/>
      <stop offset="1" stop-color="${deskDark}"/>
    </linearGradient></defs>
    <rect width="100" height="100" fill="url(#g${uid})"/>
    <path d="M0 30 Q50 34 100 30" stroke="${deskDark}" stroke-width=".6" fill="none" opacity=".5"/>
    <path d="M0 55 Q50 52 100 55" stroke="${deskDark}" stroke-width=".6" fill="none" opacity=".4"/>
    <rect x="40" y="48" width="22" height="18" fill="#2a2a2a" opacity=".85" rx="1.5"/>
    <rect x="42" y="50" width="18" height="14" fill="#ddd" rx="1"/>
    ${cubeSet.map(([cx,cy,col])=>`
      <rect x="${cx}" y="${cy}" width="8" height="8" fill="${col}" rx="1"/>
      <rect x="${cx}" y="${cy}" width="8" height="2" fill="rgba(255,255,255,.3)" rx="1"/>
    `).join('')}
    <rect x="${gx-2}" y="0" width="4" height="18" fill="#ddd"/>
    <rect x="${gx-7}" y="16" width="14" height="6" fill="#aaa" rx="1"/>
    <rect x="${gx-7}" y="22" width="3" height="8" fill="#999"/>
    <rect x="${gx+4}" y="22" width="3" height="8" fill="#999"/>`;
}
function frameSVG(t){
  const uid = _gid++;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${_frameSVGInner(t,uid)}</svg>`;
}
function maskedFrameSVG(t, bbox){
  const uid = _gid++;
  const ps = 100 / 16;
  const bx = bbox.c0 * ps, by = bbox.r0 * ps;
  const bw = (bbox.c1 - bbox.c0 + 1) * ps, bh = (bbox.r1 - bbox.r0 + 1) * ps;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    ${_frameSVGInner(t,uid)}
    <path fill-rule="evenodd" fill="rgba(0,0,0,0.55)"
      d="M0,0 H100 V100 H0 Z M${bx},${by} H${bx+bw} V${by+bh} H${bx} Z"/>
    <rect x="${bx}" y="${by}" width="${bw}" height="${bh}"
      fill="none" stroke="#d85400" stroke-width="2" rx="1"/>
  </svg>`;
}

/* =================================================================
   patchGridSVG
================================================================= */
function patchGridSVG(opts){
  const N = 16;
  const mode = opts.mode || 'partial';
  const ps = opts.ps || 9;
  const showFrame = opts.frame !== false;
  const W = N*ps, H = N*ps;
  const sigSet = new Set((opts.sigPatches||[]).map(([r,c]) => r*N+c));
  const fillSet = new Set();
  if(mode === 'partial' && opts.fillRect){
    const {r0,c0,r1,c1} = opts.fillRect;
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) fillSet.add(r*N+c);
  }
  let rects = '';
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const idx = r*N+c;
    const fill = mode === 'full' ? '#2f9d62'
               : sigSet.has(idx)  ? '#d85400'
               : fillSet.has(idx) ? 'rgba(47,111,214,0.55)'
               : '#ccc5b5';
    rects += `<rect x="${c*ps}" y="${r*ps}" width="${ps-1}" height="${ps-1}" fill="${fill}" rx=".5"/>`;
  }
  let outline = '';
  if(mode === 'partial' && opts.fillRect){
    const {r0,c0,r1,c1} = opts.fillRect;
    outline = `<rect x="${c0*ps}" y="${r0*ps}" width="${(c1-c0+1)*ps}" height="${(r1-r0+1)*ps}"
      fill="none" stroke="#2f6fd6" stroke-width="2.5" rx="2"/>`;
  }
  const borderStyle = showFrame ? 'border:1px solid var(--rule);' : 'border:none;';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
    style="display:block;border-radius:4px;${borderStyle}">${rects}${outline}</svg>`;
}

/* =================================================================
   Δ curve inset (CLIP)
================================================================= */
(function drawDeltaCurve(){
  const svg = document.getElementById('curveSvg');
  const W = 320, H = 100, padL = 8, padR = 6, padT = 8, padB = 12;
  const iW = W-padL-padR, iH = H-padT-padB, maxY = 0.9;
  const x = i => padL + (i/(T-1))*iW;
  const y = v => padT + iH - (v/maxY)*iH;
  const tau = 0.35;
  const curve = [];
  for(let t=0;t<T;t++){
    let v = 0.07 + Math.sin(t*.65)*.03 + (Math.random()*.04-.02);
    if(keyframes.includes(t) && t!==0) v = 0.55 + Math.random()*.18;
    curve.push(Math.max(0, v));
  }
  curve[0] = 0.02;
  let html = '';
  for(let g=0;g<=2;g++){
    const yy = padT + (g/2)*iH;
    html += `<line x1="${padL}" x2="${W-padR}" y1="${yy}" y2="${yy}" stroke="#e8dfcc" stroke-width=".5"/>`;
  }
  html += `<line x1="${padL}" x2="${W-padR}" y1="${y(tau)}" y2="${y(tau)}" stroke="#d85400" stroke-width="1" stroke-dasharray="3 2.5" opacity=".7"/>`;
  html += `<text x="${W-padR-2}" y="${y(tau)-2}" font-family="JetBrains Mono" font-size="8" fill="#d85400" text-anchor="end">τ</text>`;
  let path = `M ${x(0)} ${y(curve[0])}`;
  for(let i=1;i<T;i++){
    const cx = (x(i-1) + x(i))/2;
    path += ` C ${cx} ${y(curve[i-1])}, ${cx} ${y(curve[i])}, ${x(i)} ${y(curve[i])}`;
  }
  html += `<defs><linearGradient id="ag" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#d85400"/><stop offset="1" stop-color="#d85400" stop-opacity="0"/>
  </linearGradient></defs>`;
  html += `<path d="${path} L${x(T-1)} ${y(0)} L${x(0)} ${y(0)} Z" fill="url(#ag)" opacity=".26"/>`;
  html += `<path d="${path}" stroke="#1a1410" stroke-width="1.2" fill="none"/>`;
  for(let i=0;i<T;i++){
    if(keyframes.includes(i)){
      html += `<circle cx="${x(i)}" cy="${y(curve[i])}" r="3" fill="#d85400" stroke="#fff" stroke-width="1"/>`;
      html += `<text x="${x(i)}" y="${H-2}" font-family="JetBrains Mono" font-size="7" fill="#d85400" font-weight="700" text-anchor="middle">${i}</text>`;
    }
  }
  html += `<line x1="${padL}" x2="${W-padR}" y1="${H-padB}" y2="${H-padB}" stroke="#4a3f35" stroke-width=".5" opacity=".6"/>`;
  svg.innerHTML = html;
})();

const events = [
  {type:'kf', render:'full',    t:0},

  {type:'mt',                   t:16, t0:8, t1:16},

function tokenCount(ev){
  if(ev.type === 'mt') return 1;
  if(ev.render === 'full') return 256;
  return rectPatchCount(tdPatchData[ev.t]?.rect);
}

function tokenGroupSVG(ev){
  const S=6, G=1, C=S+G;
  let cols, rows, fill;
  if(ev.type==='mt'){ cols=1; rows=1; fill='#2f6fd6'; }
  else if(ev.render==='full'){ cols=16; rows=16; fill='#d85400'; }
  else{
    const r=tdPatchData[ev.t]?.rect;
    cols=r.c1-r.c0+1; rows=r.r1-r.r0+1; fill='#d85400';
  }
  const W=cols*C-G, H=rows*C-G;
  let rs='';
  for(let row=0;row<rows;row++) for(let c=0;c<cols;c++)
    rs+=`<rect x="${c*C}" y="${row*C}" width="${S}" height="${S}" fill="${fill}" rx="0.5"/>`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${rs}</svg>`;
}

(function buildTokenGroups(){
  const container = document.getElementById('tokSequence');
  events.forEach(ev => {
    const name = ev.type==='mt' ? `MT@${ev.t}` : `KF@${ev.t}`;
    const S=6, G=1, C=S+G;
    let rows;
    if(ev.type==='mt') rows=1;
    else if(ev.render==='full') rows=16;
    else{ const r=tdPatchData[ev.t]?.rect; rows=r.r1-r.r0+1; }
    const H=rows*C-G;
    const BW=9, d=2;
    const brace=`<svg width="${BW}" height="${H}" viewBox="0 0 ${BW} ${H}"><path d="M ${BW},0 C ${BW},${H/4} ${d},${H/4} ${d},${H/2} C ${d},${3*H/4} ${BW},${3*H/4} ${BW},${H}" fill="none" stroke="#4a3f35" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    const group = document.createElement('div');
    group.className = `tok-group ${ev.type}`;
    group.innerHTML = `
      <div class="tg-label">
        <span class="tg-name ${ev.type}">${name}</span>
        <span class="tg-time">t=${ev.t}</span>
      </div>
      <div class="tg-right">${brace}${tokenGroupSVG(ev)}</div>`;
    container.appendChild(group);
  });
})();
